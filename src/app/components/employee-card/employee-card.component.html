<article class="card mb-3 shadow bg-secondary">
    <div class="card-body d-flex justify-content-between align-items-center">
        <div>
            <h5 class="card-title"> {{ employee()?.nombre }} - {{ employee()?.email }} </h5>
        </div>
        <div class="btn-group" role="group">
            <button type="button" class="btn btn-sm btn-danger">Borrar</button>
            <button type="button" class="btn btn-sm btn-warning">Actualizar</button>
            <button type="button" class="btn btn-sm btn-info">Ver</button>
        </div>
    </div>
</article>
